{% extends 'base.html' %}

{% block title %}
    Character Talk
{% endblock %}

{% block content %}
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/characterTalk.css' %}">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <meta name="username" content="{{ user.username }}">
    <meta name="level" content="{{ character.level }}">
    <meta name="motivation" content="{{ character.current_motivation }}">



    <div id="stars"></div>

  <div class="chat-container">
    <header>
      <h1>You</h1>
      <button id="journal-btn">Journal</button>
    </header>

    <div id="chat-window"></div>

    <div class="chat-input">
      <input type="text" id="user-input" placeholder="Talk to your Inner Self..." />
      <button id="send-btn">Send</button>
    </div>
  </div>

  <!-- Journal Overlay -->
  <div id="journal-overlay">
    <div class="journal-content">
      <h2>My Journal</h2>
      <textarea placeholder="Write your thoughts here..."></textarea>
      <button id="save-journal">Save</button>
      <button id="close-journal">Close</button>
    </div>
  </div>

  <!-- Fidget Spinner -->
  <div id="fidget-spinner"></div>



 <script src="{% static 'js/characterTalk.js' %}"></script>



{% endblock %}

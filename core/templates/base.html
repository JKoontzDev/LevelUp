<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Josh">
    <meta name="description" content="LevelUp is a self improvement app that allows users to make a character and have goals that they complete in real life. Finishing these goals allows the player to send their character on quests and level up like a video game.">
    <meta name="keywords" content="self-improvement, game, LevelUp">
    <meta http-equiv="Content-Language" content="en">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="{% static 'img/sword.png' %}">



    <link rel="stylesheet" href="{% static 'css/base.css' %}">

    <title>
        {% block title %}
        {% endblock %}
    </title>
</head>
<body >
    <meta name="exp" content="{{ character.exp }}">
    <meta name="tutorial" content="{{ tutorial }}">


    <div class="wrapper">


        <div class="background-animation"></div>
        <header class="hero">
            <div class="profile-card" id="character">
                <a href="{% url 'characterPage' username=user.username %}"><img src="{{user.profile_picture.url}}" alt="User Avatar"></a>
                <div class="info">
                    <div  class="username">{{ character.rank }}</div>
                    <div title="{{ character.exp }}%" class="xp-bar hover-box"><div id="fillExp" data-exp="{{ character.exp }}"></div></div>
                </div>
            </div>
            <div>

            </div>
            <div>
                {% if user.is_authenticated %}
                <h3><a href="{% url 'logout' %}">Logout</a></h3>
                <h3><a href="{% url 'dashboard' username=user.username %}">Dashboard</a></h3>


                {% endif %}
            </div>
        </header>
        <div class="container">
            {% block content %}
            {% endblock %}
        </div>

        <footer class="footer">
            <button id="fireButton" class="challenge-btn">Fuel My Fire🔥</button>
        </footer>
    </div>
    <script src="{% static 'js/base.js' %}"></script>
    <script src="{% static 'js/tutorial.js' %}"></script>
    <script src="{% static 'js/logout.js' %}"></script>


</body>
</html>
